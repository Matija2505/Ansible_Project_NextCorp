- name: Create backup directory
  ansible.builtin.file:
    path: /var/backups/nexcore
    state: directory
    owner: root
    group: root
    mode: "0750"


- name: Deploy backup script
  ansible.builtin.template:
    src: db-backup.sh.j2
    dest: /usr/local/bin/nexcore-db-backup.sh
    mode: "0750"


- name: Schedule nightly backup
  ansible.builtin.cron:
    name: "NexCore DB Backup"
    minute: "0"
    hour: "1"
    job: "/usr/local/bin/nexcore-db-backup.sh"





============
templates/db-backup.sh.j2
==============

#!/bin/bash

BACKUP_DIR="/var/backups/nexcore"
LOG_FILE="/var/log/nexcore-backup.log"
DATE=$(date '+%F %H:%M:%S')
FILE_DATE=$(date +%F-%H-%M)
BACKUP_FILE="$BACKUP_DIR/nexcore-db-$FILE_DATE.sql"

find $BACKUP_DIR -type f -mtime +10 -delete

echo "[$DATE] Backup started" >> "$LOG_FILE"

if mysqldump --all-databases \
    --single-transaction \
    --quick \
    --lock-tables=false \
    > "$BACKUP_FILE"; then

    gzip "$BACKUP_FILE"
    echo "[$DATE] SUCCESS: Backup completed $BACKUP_FILE.gz" >> "$LOG_FILE"

else
    echo "[$DATE] ERROR: Backup FAILED" >> "$LOG_FILE"
    exit 1
fi

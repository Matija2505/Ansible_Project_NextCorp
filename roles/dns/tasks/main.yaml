---
#
# INSTALL BIND
#

- name: Install Bind DNS packages
  ansible.builtin.dnf:
    name: "{{ bind_packages }}"
    state: present

#
# DEPLOY named.conf
#

- name: Deploy named.conf
  ansible.builtin.template:
    src: named.conf.j2
    dest: /etc/named.conf
    owner: root
    group: named
    mode: '0640'
  notify: restart named

#
# DEPLOY ZONE FILE
#

- name: Deploy DNS zone file
  ansible.builtin.template:
    src: "db.{{ dns_zone }}.j2"
    dest: "/var/named/{{ dns_zone }}.zone"
    owner: root
    group: named
    mode: '0640'
  notify: restart named

#
# VALIDATE ZONE
#

- name: Validate named configuration
  ansible.builtin.command: named-checkconf
  register: named_conf
  changed_when: false
  failed_when: named_conf.rc != 0

- name: Validate DNS zone
  ansible.builtin.command: "named-checkzone {{ dns_zone }} /var/named/{{ dns_zone }}.zone"
  register: zone_check
  changed_when: false
  failed_when: zone_check.rc != 0

#
# ENABLE SERVICE
#

- name: Ensure named is enabled and running
  ansible.builtin.service:
    name: "{{ dns_service }}"
    enabled: true
    state: started

#
# CONFIGURE DNS RESOLVER
#

- name: Configure resolv.conf
  ansible.builtin.template:
    src: resolv.conf.j2
    dest: /etc/resolv.conf
    owner: root
    group: root
    mode: '0644'

...
